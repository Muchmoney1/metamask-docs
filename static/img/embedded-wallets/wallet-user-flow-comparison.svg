<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="wf-title wf-desc" color-scheme="light dark" role="img" viewBox="79 47 794 434"><title id="wf-title">Traditional standalone wallet versus Embedded Wallets end-user steps</title><desc id="wf-desc">Six numbered steps for a traditional standalone wallet compared to three steps for Embedded Wallets, with a vertical divider between the columns.</desc><defs><style>.wf-body{fill:#121314}.wf-body,.wf-num,.wf-title{font-family:Geist,Arial,&apos;Helvetica Neue&apos;,Helvetica,sans-serif}.wf-title{font-size:20px;font-weight:600;fill:#121314}.wf-body{font-size:19px;font-weight:400}.wf-num{font-size:18px;font-weight:600;fill:#3d065f}.wf-frame{fill:#f7f9fc}.wf-frame,.wf-rule,.wf-step-circle{stroke:#d075ff;stroke-width:2}.wf-step-circle{fill:#eac2ff}@media (prefers-color-scheme:dark){.wf-frame{fill:none;stroke:#d075ff}.wf-body,.wf-num,.wf-title{fill:#fff}.wf-rule{stroke:#d075ff}.wf-step-circle{fill:#3d065f;stroke:#eac2ff}}</style></defs><g transform="translate(476,264) scale(0.85) translate(-476,-264)"><rect width="920" height="496" x="16" y="16" class="wf-frame" rx="14" ry="14"/><g transform="translate(24,20)"><line x1="460" x2="460" y1="-4" y2="492" class="wf-rule"/><text x="28" y="40" class="wf-title">Traditional standalone wallet</text><text x="482" y="40" class="wf-title">Embedded Wallets</text><line x1="42" x2="42" y1="112" y2="415" class="wf-rule"/><line x1="496" x2="496" y1="112" y2="214" class="wf-rule"/><circle cx="42" cy="96" r="16" class="wf-step-circle"/><text x="42" y="96" class="wf-num" dominant-baseline="central" text-anchor="middle">1</text><text class="wf-body"><tspan x="80" y="90">Download and install the wallet</tspan> <tspan x="80" y="114">extension or mobile app.</tspan></text><circle cx="42" cy="163" r="16" class="wf-step-circle"/><text x="42" y="163" class="wf-num" dominant-baseline="central" text-anchor="middle">2</text><text x="80" y="163" class="wf-body" dominant-baseline="central">Create a new wallet</text><circle cx="42" cy="230" r="16" class="wf-step-circle"/><text x="42" y="230" class="wf-num" dominant-baseline="central" text-anchor="middle">3</text><text x="80" y="230" class="wf-body" dominant-baseline="central">Store the 12-24 word seed phrase</text><circle cx="42" cy="297" r="16" class="wf-step-circle"/><text x="42" y="297" class="wf-num" dominant-baseline="central" text-anchor="middle">4</text><text x="80" y="297" class="wf-body" dominant-baseline="central">Connect the dapp and the wallet</text><circle cx="42" cy="364" r="16" class="wf-step-circle"/><text x="42" y="364" class="wf-num" dominant-baseline="central" text-anchor="middle">5</text><text class="wf-body"><tspan x="80" y="357">Sign the wallet request to approve</tspan> <tspan x="80" y="381">the connection</tspan></text><circle cx="42" cy="431" r="16" class="wf-step-circle"/><text x="42" y="431" class="wf-num" dominant-baseline="central" text-anchor="middle">6</text><text x="80" y="431" class="wf-body" dominant-baseline="central">Ready to receive wallet requests</text><circle cx="496" cy="96" r="16" class="wf-step-circle"/><text x="496" y="96" class="wf-num" dominant-baseline="central" text-anchor="middle">1</text><text class="wf-body"><tspan x="536" y="90">Sign in using the preferred provider</tspan> <tspan x="536" y="114">(Google, Facebook, etc.)</tspan></text><circle cx="496" cy="163" r="16" class="wf-step-circle"/><text x="496" y="163" class="wf-num" dominant-baseline="central" text-anchor="middle">2</text><text x="536" y="163" class="wf-body" dominant-baseline="central">Approve the sign-in request</text><circle cx="496" cy="230" r="16" class="wf-step-circle"/><text x="496" y="230" class="wf-num" dominant-baseline="central" text-anchor="middle">3</text><text x="536" y="230" class="wf-body" dominant-baseline="central">Ready to receive wallet requests</text></g></g></svg>